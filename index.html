<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Censor Bars</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/control-panel.css" />
  </head>
  <body>
    <div id="panel" class="panel" data-tauri-drag-region>
      <!-- Title bar -->
      <div class="panel-titlebar" data-tauri-drag-region>
        <div class="panel-titlebar-left" data-tauri-drag-region>
          <span class="panel-icon">■</span>
          <span class="panel-title">Censor Bars</span>
        </div>
        <div class="panel-titlebar-right">
          <button id="btn-minimize" class="titlebar-btn" title="Minimize to tray">
            <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button id="btn-close" class="titlebar-btn titlebar-btn-close" title="Close to tray">
            <svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
        </div>
      </div>

      <!-- New Bar + Passthrough toggle -->
      <div class="panel-actions">
        <button id="btn-new-bar" class="btn btn-primary btn-full">
          <span class="btn-icon-plus">+</span>
          New Bar
        </button>
        <div style="height: 6px;"></div>
        <button id="btn-passthrough" class="btn btn-passthrough btn-full" title="Toggle click-through mode (Alt+P)">
          <span class="passthrough-indicator"></span>
          Click-Through Mode
          <kbd style="margin-left: auto;">Alt+P</kbd>
        </button>
      </div>

      <!-- Undo/Redo indicator -->
      <div class="panel-history">
        <button id="btn-undo" class="btn btn-icon-only" title="Undo (Ctrl+Alt+Z)" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h13a4 4 0 0 1 0 8H7"/><path d="m3 10 4-4"/><path d="m3 10 4 4"/></svg>
        </button>
        <button id="btn-redo" class="btn btn-icon-only" title="Redo (Ctrl+Alt+Y)" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H8a4 4 0 1 0 0 8h9"/><path d="m21 10-4-4"/><path d="m21 10-4 4"/></svg>
        </button>
        <span id="history-status" class="history-status"></span>
      </div>

      <!-- Bar/Group list -->
      <div class="panel-list-container">
        <div class="panel-section-title">Active Bars</div>
        <div id="bar-list" class="bar-list">
          <p class="bar-list-empty">No active bars.<br>Click <strong>New Bar</strong> or press <kbd>Ctrl+N</kbd></p>
        </div>
      </div>

      <!-- Footer shortcuts -->
      <div class="panel-footer">
        <kbd>Ctrl+N</kbd> New &middot; <kbd>Del</kbd> Delete &middot; <kbd>Ctrl+Alt+Z/Y</kbd> Undo/Redo &middot; <kbd>Alt+P</kbd> Passthrough
      </div>

      <!-- Theme toggle (sun icon for light mode) -->
      <button id="btn-theme-toggle" class="theme-toggle" title="Toggle light/dark theme">
        <!-- Sun icon (shown in dark mode → click to go light) -->
        <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon icon (shown in light mode → click to go dark) -->
        <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
